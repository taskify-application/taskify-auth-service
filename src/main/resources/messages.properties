# Authentication Success Messages
auth.signup.success=Registration successful! Please verify the OTP sent to your account.
auth.verify.success=Account verified successfully! Welcome to Taskify.
auth.login.success=Login successful! Welcome back.
auth.refresh.success=Token refreshed successfully!

# Authentication Error Messages
auth.error.email-exists=Email is already registered!
auth.error.otp-expired=OTP has expired or does not exist!
auth.error.otp-invalid=Invalid OTP code!
auth.error.user-mismatch=User verification target mismatch!
auth.error.generic=An unexpected internal server error occurred.
auth.error.invalid-credentials=Invalid email or password!
auth.error.not-verified=Please verify your account via OTP before logging in.
auth.error.token-invalid=Invalid or expired refresh token!
