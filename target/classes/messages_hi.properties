# Authentication Success Messages (Hindi)
auth.signup.success=पंजीकरण सफल रहा! कृपया अपने खाते पर भेजे गए ओटीपी (OTP) को सत्यापित करें।
auth.verify.success=खाता सफलतापूर्वक सत्यापित हो गया है! टैस्कीफाई (Taskify) में आपका स्वागत है।
auth.login.success=लॉगिन सफल रहा! वापस स्वागत है।
auth.refresh.success=टोकन सफलतापूर्वक रिफ्रेश हो गया है!

# Authentication Error Messages (Hindi)
auth.error.email-exists=यह ईमेल पहले से ही पंजीकृत है!
auth.error.otp-expired=ओटीपी (OTP) की अवधि समाप्त हो चुकी है या इसका कोई अस्तित्व नहीं है!
auth.error.otp-invalid=अमान्य ओटीपी (OTP) कोड!
auth.error.user-mismatch=उपयोगकर्ता सत्यापन लक्ष्य मेल नहीं खाता!
auth.error.generic=एक अप्रत्याशित आंतरिक सर्वर त्रुटि हुई है।
auth.error.invalid-credentials=अमान्य ईमेल या पासवर्ड!
auth.error.not-verified=कृपया लॉग इन करने से पहले ओटीपी (OTP) के माध्यम से अपना खाता सत्यापित करें।
auth.error.token-invalid=अमान्य या समाप्त हो चुका रिफ्रेश टोकन!